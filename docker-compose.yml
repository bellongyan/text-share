version: '3.8'

services:
  app:
    build: .
    ports:
      - "80:80"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=postgres
      - DB_NAME=textshare
      - DB_USERNAME=textshare
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - textshare-network

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=textshare
      - POSTGRES_USER=textshare
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - textshare-network

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - textshare-network

volumes:
  postgres-data:
  redis-data:

networks:
  textshare-network:
    driver: bridge